_schema-version: "3.1"
ID: bp-cap-fiori
version: 1.0.0
description: Business Partner CAP Application with Fiori Elements

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci --production

modules:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Approuter
  # ────────────────────────────────────────────────────────────────────────────
  - name: bp-cap-fiori-approuter
    type: approuter.nodejs
    path: app/bp-manager
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: bp-cap-xsuaa
      - name: bp-cap-html5-runtime
        group: destinations
        properties:
          name: ui5
          url: https://ui5.sap.com
          forwardAuthToken: false
      - name: bp-cap-destination
      - name: srv-api
        group: destinations
        properties:
          name: bp-cap-srv
          url: ~{srv-url}
          forwardAuthToken: true
    provides:
      - name: app-binding
        properties:
          app-url: ${default-url}

  # ────────────────────────────────────────────────────────────────────────────
  # 2. CAP Node.js Service
  # ────────────────────────────────────────────────────────────────────────────
  - name: bp-cap-fiori-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 1024M
      health-check-type: http
      health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    properties:
      EXIT: 1
    requires:
      - name: bp-cap-db
      - name: bp-cap-xsuaa
      - name: bp-cap-destination
      - name: bp-cap-logging
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ────────────────────────────────────────────────────────────────────────────
  # 3. HANA DB Deployer
  # ────────────────────────────────────────────────────────────────────────────
  - name: bp-cap-fiori-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: bp-cap-db

resources:

  - name: bp-cap-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: bp-cap-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: bp-cap-fiori-${org}-${space}
        tenant-mode: dedicated

  - name: bp-cap-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: bp-cap-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: lite

  - name: bp-cap-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
